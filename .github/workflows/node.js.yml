name: "SmartOPD Backend CI & Security"

on:
  push:
    # Trigger on EVERY push to EVERY branch
    branches: [ "**" ]
  pull_request:
    # Double-check PRs specifically targeting your core branches
    branches: [ "master", "development" ]
  schedule:
    # Weekly security deep-scan
    - cron: '30 1 * * 1'

jobs:
  # LAYER 1: Functional Integrity (Build, Lint, Test)
  ci:
    name: Build & Test (Node 20.x)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Code Linting
        # Uses your eslint configuration
        run: npm run lint

      - name: Build Application
        # Verifies NestJS compilation (nest build)
        run: npm run build

      - name: Execute Tests
        # Runs your Jest suite
        run: npm test

  # LAYER 2: Security Analysis (CodeQL)
  analyze:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Higher security focus for your TypeORM and JWT logic
          queries: security-extended

      - name: Build for Analysis
        # NestJS often requires a real build to resolve metadata for CodeQL
        run: |
          npm ci
          npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
